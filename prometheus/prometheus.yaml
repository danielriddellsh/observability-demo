---
# Custom Prometheus config for the observability demo.
# Extends otel-lgtm's default config with rule_files for SLO recording rules.
global:
  scrape_native_histograms: true
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/recording-rules.yaml

otlp:
  keep_identifying_resource_attributes: true
  # Promote OTel resource attributes to Prometheus labels so we can slice by
  # service, environment, region, version, etc.
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment
    - deployment.environment.name
    - k8s.cluster.name
    - host.name

storage:
  tsdb:
    out_of_order_time_window: 10m
